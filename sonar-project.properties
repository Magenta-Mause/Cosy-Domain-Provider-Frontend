sonar.organization=magenta-mause
sonar.projectKey=Magenta-Mause_Cosy-Domain-Provider-Frontend
sonar.projectName=Cosy Domain Provider Frontend

sonar.sources=src
sonar.tests=src
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx
sonar.exclusions=src/api/generated/**,src/routeTree.gen.ts,src/test/**,src/main.tsx,src/entry-server.tsx
sonar.cpd.exclusions=src/i18n/resources.ts

# Route files are declarative TanStack Router wiring (createFileRoute plus a
# thin component shell) and are exercised end-to-end, not by unit tests.
sonar.coverage.exclusions=src/routes/**

sonar.javascript.lcov.reportPaths=coverage/lcov.info
